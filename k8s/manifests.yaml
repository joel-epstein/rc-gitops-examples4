apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-foobar-1
  namespace: foobar-1
spec:
  replicas: 1
  selector:
    matchLabels:
      greymatter.io/cluster: edge-foobar-1
  template:
    metadata:
      labels:
        greymatter.io/cluster: edge-foobar-1
    spec:
      containers:
        - name: sidecar
          # image: greymatter.jfrog.io/oci/greymatter-proxy:1.8.0-ubi8.6-2022-11-22
          image: greymatter.jfrog.io/internal-oci/gm-proxy:eia
          imagePullPolicy: Always
          ports:
          - containerPort: 10809
            name: proxy
          env:
            - name: XDS_CLUSTER
              value: edge-foobar-1
            - name: ENVOY_ADMIN_LOG_PATH
              value: /dev/stdout
            - name: PROXY_DYNAMIC
              value: "true"
            - name: XDS_ZONE
              value: default-zone
            - name: XDS_HOST
              value: controlensemble.greymatter.svc.cluster.local
            - name: XDS_PORT
              value: "50000"
          resources:
            limits:
              cpu: 200m
              memory: 200Mi
            requests:
              cpu: 100m
              memory: 128Mi
      imagePullSecrets:
      - name: gm-docker-secret
---
apiVersion: v1
kind: Service
metadata:
  name: edge-foobar-1
  namespace: foobar-1
spec:
  ports:
  - name: ingress
    port: 10809
    protocol: TCP
    targetPort: 10809
  selector:
    greymatter.io/cluster: edge-foobar-1
  type: LoadBalancer

